# Docker Compose for local development (builds from source)
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up --build

version: '3.8'

services:
  gotimedate:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - LOG_FILE=logs/server.log
      - DEFAULT_TZ=UTC
      - ALLOWED_ORIGINS=*
      - ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - ALLOWED_HEADERS=Origin,Content-Type,Accept,Authorization
      - ALLOW_CREDENTIALS=true
      - MAX_AGE=3600
      - WS_PING_INTERVAL=30
      - WS_PONG_WAIT=60
      - WS_WRITE_WAIT=10
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
