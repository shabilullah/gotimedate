# GoTimeDate Docker Compose Configuration
#
# Quick Start:
#   docker-compose up -d        # Start service
#   docker-compose logs -f      # View logs
#   docker-compose down         # Stop service
#
# To Change Port:
#   Edit TWO places below (all must match):
#   - Line 22: Change both "9000:9000" numbers (HOST:CONTAINER)
#   - Line 24: Change PORT=9000 (app reads this)
#   - Line 42: Change healthcheck port to match
#
# For local development (building from source):
#   Replace the 'image:' line with:
#     build:
#       context: .
#       dockerfile: Dockerfile

version: '3.8'

services:
  gotimedate:
    image: ghcr.io/shabilullah/gotimedate:latest
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - LOG_FILE=logs/server.log
      # Timezone settings
      - DEFAULT_TZ=Asia/Kuala_Lumpur
      # CORS settings
      - ALLOWED_ORIGINS=*
      - ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - ALLOWED_HEADERS=Origin,Content-Type,Accept,Authorization
      - ALLOW_CREDENTIALS=true
      - MAX_AGE=3600
      # WebSocket settings
      - WS_PING_INTERVAL=30
      - WS_PONG_WAIT=60
      - WS_WRITE_WAIT=10
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
