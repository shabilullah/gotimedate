# GoTimeDate Docker Compose Configuration
#
# Quick Start:
#   docker-compose up -d        # Start service
#   docker-compose logs -f      # View logs
#   docker-compose down         # Stop service
#
# To Change Port:
#   Edit TWO places below (all must match):
#   - Line 23: Change both "9000:9000" numbers
#   - Line 25: Change PORT=9000
#   - Line 43: Change health check port
#   - Line 46: Change health check port

version: '3.8'

services:
  gotimedate:
    image: ghcr.io/shabilullah/gotimedate:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"              # HOST_PORT:CONTAINER_PORT - change both to match
    environment:
      - PORT=9000                 # CHANGE THIS: App reads this to know which port to listen on
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - LOG_FILE=/app/logs/server.log
      # CORS settings
      - ALLOWED_ORIGINS=*
      - ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - ALLOWED_HEADERS=Origin,Content-Type,Accept,Authorization
      - ALLOW_CREDENTIALS=true
      - MAX_AGE=3600
      # WebSocket settings
      - WS_PING_INTERVAL=30
      - WS_PONG_WAIT=60
      - WS_WRITE_WAIT=10
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
